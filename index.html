<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#1C3829;--green2:#2A5240;--gold:#C9A84C;--gold2:#dbb95a;
  --bg:#F5EFE3;--bg2:#EDE5D5;--white:#FFFFFF;
  --text:#1a0e04;--text2:#4a3728;--text3:#8a6e5a;--border:#D8CCBA;
  --shadow:rgba(28,56,41,.12);
  --node-w:148px;--node-h:82px;
}
html,body{height:100%;overflow:hidden;font-family:'CaslonBecker','Inter',serif;background:var(--bg)}
#root{height:100%;display:flex;flex-direction:column}

/* ── HEADER ── */
.hdr{
  background:var(--green);height:52px;
  display:flex;align-items:center;gap:12px;padding:0 18px;
  flex-shrink:0;z-index:20;
}
.hdr-crest{
  width:32px;height:32px;flex-shrink:0;cursor:pointer;
  border:1.5px solid var(--gold);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.hdr-crest svg{width:20px;height:20px}
.hdr-title{font-family:'NexaScript',cursive;font-size:22px;color:var(--gold);letter-spacing:.02em;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-nav{display:flex;gap:4px;flex-shrink:0}
.nav-btn{
  background:transparent;border:1px solid rgba(201,168,76,.4);
  color:rgba(255,255,255,.75);padding:5px 14px;border-radius:20px;
  cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;
  transition:all .15s;white-space:nowrap;
}
.nav-btn:hover,.nav-btn.on{background:var(--gold);color:var(--green);border-color:var(--gold);font-weight:600}
.hdr-search{position:relative;flex-shrink:0}
.s-inp{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#fff;padding:5px 12px 5px 30px;border-radius:20px;
  font-size:13px;font-family:'Inter',sans-serif;width:170px;transition:all .2s;
}
.s-inp:focus{outline:none;border-color:var(--gold);width:210px}
.s-inp::placeholder{color:rgba(255,255,255,.4)}
.s-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);font-size:13px;pointer-events:none}
.s-res{
  position:absolute;top:calc(100% + 6px);right:0;width:270px;
  background:var(--white);border-radius:10px;border:1px solid var(--border);
  box-shadow:0 12px 32px var(--shadow);z-index:200;max-height:280px;overflow-y:auto;
}
.s-item{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.s-item:last-child{border:none}
.s-item:hover{background:var(--bg)}
.s-item-name{font-size:13px;font-weight:500;color:var(--text)}
.s-item-sub{font-size:11px;color:var(--text3)}

/* ── TOOLBAR ── */
.toolbar{
  background:var(--green2);height:34px;
  display:flex;align-items:center;gap:10px;padding:0 18px;flex-shrink:0;
}
.t-label{color:rgba(255,255,255,.5);font-size:12px}
.t-chip{
  padding:2px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.65);cursor:pointer;font-size:12px;transition:all .15s;
}
.t-chip:hover,.t-chip.on{background:var(--gold);color:var(--green);border-color:var(--gold);font-weight:600}
.t-stats{margin-left:auto;color:rgba(255,255,255,.45);font-size:11px;display:flex;gap:18px}
.t-stats b{color:var(--gold)}
.admin-badge{color:var(--gold2);font-size:11px}

/* ── MAIN ── */
.main{flex:1;overflow:hidden;position:relative}

/* ── TREE ── */
.tree-root{width:100%;height:100%;overflow:hidden;cursor:grab;position:relative;background:radial-gradient(ellipse at 50% 60%,#f9f3e8 0%,var(--bg) 70%)}
.tree-root:active{cursor:grabbing}
.tree-root svg{position:absolute;top:0;left:0;width:100%;height:100%}
.tree-controls{position:absolute;right:16px;bottom:16px;display:flex;flex-direction:column;gap:5px;z-index:10}
.tc{width:34px;height:34px;background:var(--white);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px var(--shadow);transition:all .15s;color:var(--text2)}
.tc:hover{background:var(--green);color:var(--white);border-color:var(--green)}

/* ── CARDS ── */
.cards-root{height:100%;overflow-y:auto;padding:20px 18px 40px}
.gen-hdr{display:flex;align-items:center;gap:10px;margin:24px 0 12px}
.gen-hdr:first-child{margin-top:0}
.gen-hdr-line{flex:1;height:1px;background:var(--border)}
.gen-hdr-text{font-family:'Artika',serif;font-size:15px;color:var(--text2);white-space:nowrap;letter-spacing:.04em}
.gen-hdr-count{font-size:12px;color:var(--text3)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}

/* ── PERSON CARD ── */
.pcard{
  background:var(--white);border-radius:10px;padding:14px 10px 12px;
  text-align:center;cursor:pointer;border:1px solid var(--border);
  box-shadow:0 1px 4px var(--shadow);transition:all .2s;position:relative;overflow:hidden;
}
.pcard::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .2s}
.pcard:hover{transform:translateY(-3px);box-shadow:0 8px 24px var(--shadow);border-color:var(--gold)}
.pcard:hover::after{transform:scaleX(1)}
.pcard.me{border-color:var(--gold);background:linear-gradient(160deg,#fff 60%,#fdf7e8 100%)}
.pcard.me::after{transform:scaleX(1)}
.pcard.dead{opacity:.82}
.av{width:64px;height:64px;border-radius:50%;margin:0 auto 9px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.av img{width:100%;height:100%;object-fit:cover}
.card-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px;font-family:'Bodoni','CaslonBecker',serif}
.card-dates{font-size:11px;color:var(--text3)}
.card-rel{font-family:'NexaScript',cursive;font-size:11px;color:var(--gold);margin-top:3px;letter-spacing:.02em}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal{background:var(--white);border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.28);animation:up .22s ease}
.m-hdr{background:var(--green);padding:18px 20px 14px;border-radius:14px 14px 0 0;position:sticky;top:0;z-index:2;display:flex;align-items:flex-start;justify-content:space-between}
.m-title{font-family:'Bodoni','CaslonBecker',serif;font-size:19px;color:#fff;line-height:1.2}
.m-rel{font-family:'NexaScript',cursive;font-size:13px;color:var(--gold);margin-top:2px;letter-spacing:.03em}
.m-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.m-close:hover{background:rgba(255,255,255,.3)}
.m-body{padding:18px 20px 20px}

/* photo */
.m-photo-wrap{text-align:center;margin-bottom:18px}
.m-av{width:100px;height:100px;border-radius:50%;margin:0 auto;border:3px solid var(--gold);overflow:hidden;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;background:var(--bg2)}
.m-av img{width:100%;height:100%;object-fit:cover}
.m-av-over{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;color:#fff;font-size:11px;gap:3px}
.m-av:hover .m-av-over{opacity:1}

/* tabs */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:14px;overflow-x:auto}
.tab{padding:7px 14px;cursor:pointer;font-size:13px;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.tab.on{color:var(--green);border-bottom-color:var(--gold);font-weight:600}

/* info grid */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ig-item{background:var(--bg);border-radius:7px;padding:9px 11px}
.ig-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.ig-val{font-size:14px;color:var(--text)}
.note{background:linear-gradient(135deg,#fffaee,#fff7e0);border-left:3px solid var(--gold);padding:11px 13px;border-radius:0 7px 7px 0;font-family:'CaslonBecker',serif;font-size:15px;color:var(--text2);line-height:1.6;margin-bottom:14px;font-style:italic}

/* relatives */
.rel-sec{margin-bottom:14px}
.rel-sec-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:7px}
.rel-chips{display:flex;flex-wrap:wrap;gap:5px}
.rel-chip{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:18px;padding:4px 10px 4px 5px;cursor:pointer;transition:all .15s;font-size:12px;color:var(--text)}
.rel-chip:hover{background:var(--green);color:#fff;border-color:var(--green)}
.rel-chip-av{width:22px;height:22px;border-radius:50%;overflow:hidden;background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.rel-chip-av img{width:100%;height:100%;object-fit:cover}
.rel-chip-lbl{font-size:9.5px;color:var(--text3);display:block}
.rel-chip:hover .rel-chip-lbl{color:rgba(255,255,255,.6)}

/* photos tab */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.ph-thumb{aspect-ratio:1;border-radius:7px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:all .15s}
.ph-thumb img{width:100%;height:100%;object-fit:cover}
.ph-thumb:hover{border-color:var(--gold);transform:scale(1.03)}
.ph-add{aspect-ratio:1;border-radius:7px;border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;color:var(--text3);font-size:12px;transition:all .15s;background:var(--bg)}
.ph-add:hover{border-color:var(--gold);color:var(--gold)}
.ph-inp{display:none}

/* buttons */
.btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;transition:all .15s}
.btn-g{background:var(--green);color:#fff}
.btn-g:hover{background:var(--green2)}
.btn-gold{background:var(--gold);color:var(--green);font-weight:600}
.btn-gold:hover{background:var(--gold2)}
.btn-out{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-out:hover{border-color:var(--text3)}
.btn-del{background:#dc2626;color:#fff}
.btn-del:hover{background:#b91c1c}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}

/* edit form */
.f-field{margin-bottom:11px}
.f-field label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:4px}
.f-inp{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:9px 11px;font-size:14px;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:border-color .15s}
.f-inp:focus{outline:none;border-color:var(--gold)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f-sec{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin:14px 0 9px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.sex-row{display:flex;gap:7px}
.sex-btn{flex:1;padding:7px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:13px;text-align:center;transition:all .15s}
.sex-btn.on{border-color:var(--green);background:var(--green);color:#fff}

/* login */
.login-box{background:var(--white);border-radius:14px;padding:30px;width:320px;box-shadow:0 24px 60px rgba(0,0,0,.3);text-align:center}
.login-title{font-family:'Bodoni',serif;font-size:26px;margin-bottom:4px;letter-spacing:.02em}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:22px}
.err{color:#dc2626;font-size:12px;margin-top:4px}

/* lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;display:flex;align-items:center;justify-content:center}
.lb img{max-width:90vw;max-height:90vh;border-radius:6px;object-fit:contain}
.lb-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.2);border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:20px;transition:background .15s}
.lb-close:hover{background:rgba(255,255,255,.35)}

/* admin dot */
.adot{position:fixed;bottom:6px;right:10px;background:none;border:none;color:var(--border);cursor:pointer;font-size:9px;z-index:50}
.adot:hover{color:var(--text3)}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* mobile */
@media(max-width:600px){
  .hdr-search,.t-stats{display:none}
  .hdr-title{font-size:16px}
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px}
  .ig{grid-template-columns:1fr}
  .f-row{grid-template-columns:1fr}
  .modal{border-radius:12px 12px 0 0;position:fixed;bottom:0;top:auto;max-height:88vh}
  .overlay{align-items:flex-end;padding:0}
}
</style>
</head>

function fn(p){if(!p)return'?';return [p.given,p.pat,p.surn].filter(Boolean).join(' ')}
function sn(p){if(!p)return'?';return [p.given,p.surn].filter(Boolean).join(' ')}
function ini(p){if(!p)return'?';return (p.given||'')[0]+(p.surn||'')[0]}
function by(p){if(!p||!p.birth)return null;const m=p.birth.match(/(\d{4})/);return m?+m[1]:null}

}

// ─── TREE LAYOUT ENGINE ────────────────────────────────────────────────────────
const NW=152,NH=80,HGAP=14,VGAP=72,GH=NH+VGAP;

function subtreeW(id,depth,maxD,persons,cache={}){
  const key=`${id}-${depth}`;if(cache[key]!==undefined)return cache[key];
  if(!id||depth>=maxD||!persons[id]){cache[key]=NW;return NW;}
  const p=persons[id];
  if(!p.famc){cache[key]=NW;return NW;}
  const fam=FAMS[p.famc];if(!fam){cache[key]=NW;return NW;}
  const fw=fam.husb?subtreeW(fam.husb,depth+1,maxD,persons,cache):0;
  const mw=fam.wife?subtreeW(fam.wife,depth+1,maxD,persons,cache):0;
  let w;
  if(!fw&&!mw)w=NW;
  else if(!fw)w=Math.max(NW,mw);
  else if(!mw)w=Math.max(NW,fw);
  else w=Math.max(NW,fw+mw+HGAP);
  cache[key]=w;return w;
}

function buildTree(rootId,maxD,persons,filter){
  const nodes=[],links=[],visited=new Set(),cache={};
  // precompute
  Object.keys(persons).forEach(id=>subtreeW(id,0,maxD,persons,cache));

  function lay(id,depth,cx,vy){
    if(!id||depth>maxD||visited.has(id))return;
    visited.add(id);
    const p=persons[id];if(!p)return;
    nodes.push({id,cx,cy:vy,w:NW,h:NH,depth});
    if(!p.famc)return;
    const fam=FAMS[p.famc];if(!fam)return;
    const fw=fam.husb?subtreeW(fam.husb,depth+1,maxD,persons,cache):0;
    const mw=fam.wife?subtreeW(fam.wife,depth+1,maxD,persons,cache):0;
    const tot=(fw||0)+(mw||0)+((fw&&mw)?HGAP:0);
    const py=vy-GH;
    let fatherCx,motherCx;
    if(fam.husb&&fam.wife){fatherCx=cx-tot/2+fw/2;motherCx=cx+tot/2-mw/2;}
    else if(fam.husb){fatherCx=cx;}
    else if(fam.wife){motherCx=cx;}
    const midX=(fatherCx!=null&&motherCx!=null)?(fatherCx+motherCx)/2:(fatherCx!=null?fatherCx:motherCx);
    links.push({childCx:cx,childCy:vy,midX,midY:(vy+py)/2,fatherCx,motherCx,parentY:py,famId:fam.id});
    if(fam.husb)lay(fam.husb,depth+1,fatherCx,py);
    if(fam.wife)lay(fam.wife,depth+1,motherCx,py);
  }
  lay(rootId,0,0,0);

  // descendants
  const main=persons[rootId];
  if(main){
    (main.fams||[]).forEach(fid=>{
      const f=FAMS[fid];if(!f)return;
      const sid=f.husb===rootId?f.wife:f.husb;
      if(sid&&persons[sid]&&!visited.has(sid)){
        visited.add(sid);
        const spCx=NW+HGAP*2;
        nodes.push({id:sid,cx:spCx,cy:0,w:NW,h:NH,depth:0,isSpouse:true});
        links.push({spouseLink:true,x1:NW/2,y1:0,x2:spCx-NW/2,y2:0});
      }
      const chil=(f.chil||[]).filter(c=>persons[c]);
      if(chil.length>0){
        const totalW=chil.length*(NW+HGAP)-HGAP;
        const spX=sid?spCx:0;
        const childBaseX=Math.min(0,spX)+(Math.abs(spX-0)/2)-(totalW/2)+NW/2;
        chil.forEach((cid,i)=>{
          if(!visited.has(cid)){
            visited.add(cid);
            const ccx=childBaseX+i*(NW+HGAP);
            nodes.push({id:cid,cx:ccx,cy:GH,w:NW,h:NH,depth:-1,isChild:true});
            links.push({childLink:true,px:0,py:0,cx:ccx,cy:GH});
          }
        });
      }
    });
  }
  return {nodes,links};
}

// ─── TREE VIEW ─────────────────────────────────────────────────────────────────
function TreeView({persons,photos,onSelect,filter}){
  const svgRef=useRef(),gRef=useRef(),zoomRef=useRef();
  const maxD=filter==='direct'?4:6;

  useEffect(()=>{
    const svg=d3.select(svgRef.current);
    svg.selectAll('*').remove();
    const W=svgRef.current?.clientWidth||900;
    const H=svgRef.current?.clientHeight||600;

    const g=svg.append('g');
    gRef.current=g;
    const {nodes,links}=buildTree(MAIN,maxD,persons,filter);

    // Links
    links.forEach(lk=>{
      if(lk.spouseLink){
        g.append('path').attr('d',`M${lk.x1},${lk.y1} L${lk.x2},${lk.y2}`)
          .attr('stroke','#C9A84C').attr('stroke-width',1.5).attr('fill','none').attr('stroke-dasharray','4,3');
        // heart
        g.append('text').attr('x',(lk.x1+lk.x2)/2).attr('y',lk.y1-6).attr('text-anchor','middle').attr('font-size',11).attr('fill','#C9A84C').text('♥');
        return;
      }
      if(lk.childLink){
        const midY=(lk.py+lk.cy)/2;
        g.append('path').attr('d',`M${lk.px},${lk.py+NH/2} L${lk.px},${midY} L${lk.cx},${midY} L${lk.cx},${lk.cy-NH/2}`)
          .attr('stroke','#B8A88A').attr('stroke-width',1.2).attr('fill','none');
        return;
      }
      // ancestor link
      const {childCx,childCy,midX,midY,fatherCx,motherCx,parentY}=lk;
      // vertical from child
      g.append('path')
        .attr('d',`M${childCx},${childCy-NH/2} L${childCx},${midY}`)
        .attr('stroke','#B8A88A').attr('stroke-width',1.2).attr('fill','none');
      // horizontal couple line
      const x1=Math.min(fatherCx!=null?fatherCx:midX,motherCx!=null?motherCx:midX);
      const x2=Math.max(fatherCx!=null?fatherCx:midX,motherCx!=null?motherCx:midX);
      g.append('path').attr('d',`M${x1},${midY} L${x2},${midY}`)
        .attr('stroke','#C9A84C').attr('stroke-width',1.2).attr('fill','none');
      // verticals to parents
      if(fatherCx!=null)g.append('path').attr('d',`M${fatherCx},${midY} L${fatherCx},${parentY+NH/2}`).attr('stroke','#B8A88A').attr('stroke-width',1.2).attr('fill','none');
      if(motherCx!=null)g.append('path').attr('d',`M${motherCx},${midY} L${motherCx},${parentY+NH/2}`).attr('stroke','#B8A88A').attr('stroke-width',1.2).attr('fill','none');
    });

    // Nodes
    nodes.forEach(nd=>{
      const {id,cx,cy,isSpouse,isChild,depth}=nd;
      const p=persons[id];if(!p)return;
      const isMe=id===MAIN;
      const photo=photos[id]||p.photo;
      const x=cx-NW/2,y=cy-NH/2;
      const fg=g.append('g').style('cursor','pointer').on('click',()=>onSelect(id));

      // shadow
      fg.append('rect').attr('x',x+2).attr('y',y+3).attr('width',NW).attr('height',NH).attr('rx',10)
        .attr('fill','rgba(28,56,41,.08)');
      // card
      fg.append('rect').attr('x',x).attr('y',y).attr('width',NW).attr('height',NH).attr('rx',10)
        .attr('fill',isMe?'#1C3829':isSpouse?'#fdf8ef':'#fff')
        .attr('stroke',isMe?'#C9A84C':isSpouse?'#C9A84C':p.sex==='M'?'#c5d8ea':'#e8c0d0')
        .attr('stroke-width',isMe?2:1);

      // top color band
      if(!isMe){
        fg.append('rect').attr('x',x).attr('y',y).attr('width',NW).attr('height',3).attr('rx',10)
          .attr('fill',p.sex==='M'?'#5a90c5':'#c97fa0');
        fg.append('rect').attr('x',x).attr('y',y+1).attr('width',NW).attr('height',2)
          .attr('fill',p.sex==='M'?'#5a90c5':'#c97fa0');
      }else{
        fg.append('rect').attr('x',x).attr('y',y).attr('width',NW).attr('height',3).attr('rx',10).attr('fill','#C9A84C');
        fg.append('rect').attr('x',x).attr('y',y+1).attr('width',NW).attr('height',2).attr('fill','#C9A84C');
      }

      // photo circle
      const avR=22,avX=cx-NW/2+avR+10,avY=cy;
      fg.append('circle').attr('cx',avX).attr('cy',avY).attr('r',avR)
        .attr('fill',p.sex==='M'?'#dbeeff':'#fce4f0')
        .attr('stroke',isMe?'#C9A84C':p.sex==='M'?'#5a90c5':'#c97fa0')
        .attr('stroke-width',1.5);

      if(photo){
        const clip=`clip_${id.replace('@','')}`;
        g.append('defs').append('clipPath').attr('id',clip).append('circle').attr('cx',avX).attr('cy',avY).attr('r',avR);
        fg.append('image').attr('href',photo).attr('x',avX-avR).attr('y',avY-avR).attr('width',avR*2).attr('height',avR*2).attr('clip-path',`url(#${clip})`).attr('preserveAspectRatio','xMidYMid slice');
      }else{
        fg.append('text').attr('x',avX).attr('y',avY).attr('text-anchor','middle').attr('dominant-baseline','central')
          .attr('font-size',12).attr('font-family','Bodoni,CaslonBecker,serif')
          .attr('fill',isMe?'#C9A84C':p.sex==='M'?'#2a5080':'#8a3060')
          .attr('font-weight','700').text(ini(p));
      }

      // name
      const nameX=avX+avR+8,nameW=NW-(avR*2+10+8+8);
      const name=p.given||(sn(p)||'').split(' ')[0]||'?';
      const surname=p.surn||'';
      fg.append('text').attr('x',nameX).attr('y',cy-12).attr('font-size',11.5).attr('font-family','Bodoni,CaslonBecker,serif').attr('font-weight','600').attr('fill',isMe?'#fff':'#1a0e04').text(name.length>13?name.slice(0,12)+'…':name);
      fg.append('text').attr('x',nameX).attr('y',cy+3).attr('font-size',10).attr('font-family','CaslonBecker,serif').attr('fill',isMe?'rgba(255,255,255,.7)':'#4a3728').text(surname.length>14?surname.slice(0,13)+'…':surname);
      const yStr=yr(p);
      if(yStr)fg.append('text').attr('x',nameX).attr('y',cy+17).attr('font-size',9.5).attr('font-family','Inter,sans-serif').attr('fill',isMe?'#C9A84C':'#8a6e5a').text(yStr);

      // deceased cross
      if(p.death)fg.append('text').attr('x',x+NW-10).attr('y',y+NH-8).attr('font-size',11).attr('fill','#a06040').attr('text-anchor','middle').text('†');
    });

    // Fit
    const allX=nodes.map(n=>n.cx);const allY=nodes.map(n=>n.cy);
    if(!allX.length)return;
    const minX=Math.min(...allX)-NW/2-20,maxX=Math.max(...allX)+NW/2+20;
    const minY=Math.min(...allY)-NH/2-20,maxY=Math.max(...allY)+NH/2+20;
    const tw=maxX-minX,th=maxY-minY;
    const sc=Math.min(W/tw,H/th,.95);
    const tx=W/2-(minX+maxX)/2*sc;
    const ty=H/2-(minY+maxY)/2*sc;
    const initT=d3.zoomIdentity.translate(tx,ty).scale(sc);

    const zoom=d3.zoom().scaleExtent([.08,3])
      .on('zoom',e=>g.attr('transform',e.transform));
    svg.call(zoom).call(zoom.transform,initT);
    zoomRef.current=zoom;
  },[filter,photos,persons]);

  function zoomBy(k){if(zoomRef.current)d3.select(svgRef.current).transition().duration(300).call(zoomRef.current.scaleBy,k);}
  function zoomFit(){if(zoomRef.current)d3.select(svgRef.current).transition().duration(400).call(zoomRef.current.scaleTo,0.7);}

  return <div className="tree-root">
    <svg ref={svgRef}/>
    <div className="tree-controls">
      <button className="tc" onClick={()=>zoomBy(1.35)}>+</button>
      <button className="tc" onClick={()=>zoomBy(.74)}>−</button>
      <button className="tc" title="По центру" onClick={zoomFit} style={{fontSize:14}}>⌖</button>
    </div>
  </div>
}

// ─── PERSON MODAL ──────────────────────────────────────────────────────────────
function PersonModal({id,photos,setPhotos,onClose,onNav,adminMode,onEdit,persons}){
  const [tab,setTab]=useState('facts');
  const [lb,setLb]=useState(null);
  const pinpRef=useRef(),ainpRef=useRef();
  const p=persons[id];if(!p)return null;
  const rel=RELATIONS[id];
  const rv=rels(id,persons);
  const mainPhoto=photos[id]||p.photo;
  const extra=photos[`${id}_x`]||[];

  function loadPhoto(file,key){
    const r=new FileReader();
    r.onload=e=>{const np={...photos,[key]:e.target.result};setPhotos(np);localStorage.setItem('fp',JSON.stringify(np));};
    r.readAsDataURL(file);
  }

  function RelChip({rid,lbl}){
    const rp=persons[rid];if(!rp)return null;
    const rph=photos[rid]||rp.photo;
    return <div className="rel-chip" onClick={()=>onNav(rid)}>
      <div className="rel-chip-av">{rph?<img src={rph} alt=""/>:<svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="11" fill={rp.sex==='M'?'#dbeeff':'#fce4f0'}/></svg>}</div>
      <div><span>{sn(rp)}</span><span className="rel-chip-lbl">{lbl}</span></div>
    </div>
  }

  return <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <div className="m-hdr">
        <div>
          <div className="m-title">{fn(p)}</div>
          {rel&&<div className="m-rel">{rel}</div>}
        </div>
        <button className="m-close" onClick={onClose}>×</button>
      </div>
      <div className="m-body">
        <div className="m-photo-wrap">
          <input type="file" accept="image/*" ref={pinpRef} className="ph-inp" onChange={e=>e.target.files[0]&&loadPhoto(e.target.files[0],id)}/>
          <div className="m-av" onClick={()=>mainPhoto?setLb(mainPhoto):pinpRef.current?.click()}>
            {mainPhoto?<img src={mainPhoto} alt=""/>:
              <svg width="100" height="100" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="50" fill={p.sex==='M'?'#dbeeff':'#fce4f0'}/>
                <circle cx="50" cy="34" r="17" fill={p.sex==='M'?'rgba(90,144,197,.5)':'rgba(201,127,160,.5)'}/>
                <path d="M12,90 Q12,64 50,64 Q88,64 88,90 Z" fill={p.sex==='M'?'rgba(90,144,197,.4)':'rgba(201,127,160,.4)'}/>
                <text x="50" y="40" textAnchor="middle" dominantBaseline="middle" fontSize="16" fontFamily="Bodoni,CaslonBecker,serif" fill={p.sex==='M'?'#2a5080':'#8a3060'} fontWeight="700">{ini(p)}</text>
              </svg>}
            <div className="m-av-over"><span style={{fontSize:20}}>+</span><span>Фото</span></div>
          </div>
        </div>
        <div className="tabs">
          {['facts','photos','rels'].map(t=><div key={t} className={`tab ${tab===t?'on':''}`} onClick={()=>setTab(t)}>
            {t==='facts'?'Факты':t==='photos'?'Фотографии':'Родственники'}
          </div>)}
        </div>
        {tab==='facts'&&<>
          <div className="ig">
            {p.birth&&<div className="ig-item"><div className="ig-label">Дата рождения</div><div className="ig-val">{p.birth}</div></div>}
            {p.death&&<div className="ig-item"><div className="ig-label">Дата смерти</div><div className="ig-val">{p.death}</div></div>}
            {p.bp&&<div className="ig-item"><div className="ig-label">Место рождения</div><div className="ig-val">{p.bp}</div></div>}
            {p.maid&&<div className="ig-item"><div className="ig-label">Дев. фамилия</div><div className="ig-val">{p.maid}</div></div>}
            {p.resi&&<div className="ig-item"><div className="ig-label">Проживание</div><div className="ig-val">{p.resi}</div></div>}
          </div>
          {p.note&&<div className="note">«{p.note}»</div>}
          {adminMode&&<button className="btn btn-gold" onClick={()=>onEdit(id)}>Редактировать</button>}
        </>}
        {tab==='photos'&&<>
          <input type="file" accept="image/*" ref={ainpRef} className="ph-inp" onChange={e=>e.target.files[0]&&loadPhoto(e.target.files[0],`${id}_x_${Date.now()}`)}/>
          <div className="photo-grid">
            {mainPhoto&&<div className="ph-thumb" onClick={()=>setLb(mainPhoto)}><img src={mainPhoto} alt=""/></div>}
            {extra.map((s,i)=><div key={i} className="ph-thumb" onClick={()=>setLb(s)}><img src={s} alt=""/></div>)}
            <div className="ph-add" onClick={()=>ainpRef.current?.click()}><span style={{fontSize:22}}>+</span><span>Добавить</span></div>
          </div>
          {!mainPhoto&&extra.length===0&&<p style={{color:'var(--text3)',fontSize:13,textAlign:'center',margin:'20px 0'}}>Нет фотографий. Нажмите «+» чтобы добавить.</p>}
        </>}
        {tab==='rels'&&<>
          {rv.parents.length>0&&<div className="rel-sec"><div className="rel-sec-title">Родители</div><div className="rel-chips">{rv.parents.map(r=><RelChip key={r.id} rid={r.id} lbl={r.l}/>)}</div></div>}
          {rv.spouses.length>0&&<div className="rel-sec"><div className="rel-sec-title">Супруг / Супруга</div><div className="rel-chips">{rv.spouses.map(r=><RelChip key={r.id} rid={r.id} lbl={r.l}/>)}</div></div>}
          {rv.children.length>0&&<div className="rel-sec"><div className="rel-sec-title">Дети</div><div className="rel-chips">{rv.children.map(r=><RelChip key={r.id} rid={r.id} lbl={r.l}/>)}</div></div>}
          {rv.siblings.length>0&&<div className="rel-sec"><div className="rel-sec-title">Братья и сёстры</div><div className="rel-chips">{rv.siblings.map(r=><RelChip key={r.id} rid={r.id} lbl={r.l}/>)}</div></div>}
        </>}
      </div>
    </div>
    {lb&&<div className="lb" onClick={()=>setLb(null)}><img src={lb} alt=""/><button className="lb-close" onClick={()=>setLb(null)}>×</button></div>}
  </div>
}

// ─── EDIT MODAL ─────────────────────────────────────────────────────────────────
function EditModal({id,persons,setPersons,onClose}){
  const src=persons[id]||INDS[id];
  const [f,setF]=useState({...src});
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  function save(){const u={...persons,[id]:{...f}};setPersons(u);localStorage.setItem('fp2',JSON.stringify(u));onClose();}
  function del(){if(!confirm(`Удалить ${sn(src)}?`))return;const u={...persons};delete u[id];setPersons(u);localStorage.setItem('fp2',JSON.stringify(u));onClose();}
  return <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <div className="m-hdr"><div className="m-title">Редактирование</div><button className="m-close" onClick={onClose}>×</button></div>
      <div className="m-body">
        <div className="f-sec">Пол</div>
        <div className="sex-row">
          <div className={`sex-btn ${f.sex==='M'?'on':''}`} onClick={()=>set('sex','M')}>Мужчина</div>
          <div className={`sex-btn ${f.sex==='F'?'on':''}`} onClick={()=>set('sex','F')}>Женщина</div>
        </div>
        <div className="f-sec">Имя</div>
        <div className="f-row">
          <div className="f-field"><label>Имя</label><input className="f-inp" value={f.given||''} onChange={e=>set('given',e.target.value)}/></div>
          <div className="f-field"><label>Отчество</label><input className="f-inp" value={f.pat||''} onChange={e=>set('pat',e.target.value)}/></div>
        </div>
        <div className="f-row">
          <div className="f-field"><label>Фамилия</label><input className="f-inp" value={f.surn||''} onChange={e=>set('surn',e.target.value)}/></div>
          <div className="f-field"><label>Девичья фамилия</label><input className="f-inp" value={f.maid||''} onChange={e=>set('maid',e.target.value)}/></div>
        </div>
        <div className="f-sec">Даты</div>
        <div className="f-row">
          <div className="f-field"><label>Дата рождения</label><input className="f-inp" value={f.birth||''} placeholder="дд.мм.гггг" onChange={e=>set('birth',e.target.value)}/></div>
          <div className="f-field"><label>Дата смерти</label><input className="f-inp" value={f.death||''} placeholder="дд.мм.гггг" onChange={e=>set('death',e.target.value)}/></div>
        </div>
        <div className="f-row">
          <div className="f-field"><label>Место рождения</label><input className="f-inp" value={f.bp||''} onChange={e=>set('bp',e.target.value)}/></div>
          <div className="f-field"><label>Проживание</label><input className="f-inp" value={f.resi||''} onChange={e=>set('resi',e.target.value)}/></div>
        </div>
        <div className="f-sec">Заметка</div>
        <textarea className="f-inp" rows={3} value={f.note||''} onChange={e=>set('note',e.target.value)} placeholder="Воспоминания, факты..."/>
        <div className="btn-row">
          <button className="btn btn-del" onClick={del}>Удалить</button>
          <button className="btn btn-out" onClick={onClose}>Отмена</button>
          <button className="btn btn-gold" onClick={save}>Сохранить</button>
        </div>
      </div>
    </div>
  </div>
}

// ─── LOGIN ──────────────────────────────────────────────────────────────────────
function LoginModal({onLogin,onClose}){
  const [u,su]=useState('');const [pw,spw]=useState('');const [err,se]=useState('');
  function go(){if(u==='admin'&&pw==='admin1234'){onLogin();onClose();}else se('Неверный логин или пароль');}
  return <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="login-box">
      <div className="login-title">Панель управления</div>
      <div className="login-sub">Войдите для редактирования</div>
      <div className="f-field"><label>Логин</label><input className="f-inp" value={u} onChange={e=>su(e.target.value)} autoComplete="off"/></div>
      <div className="f-field"><label>Пароль</label><input className="f-inp" type="password" value={pw} onChange={e=>spw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}/></div>
      {err&&<div className="err">{err}</div>}
      <div className="btn-row" style={{justifyContent:'center',marginTop:14}}>
        <button className="btn btn-out" onClick={onClose}>Отмена</button>
        <button className="btn btn-gold" onClick={go}>Войти</button>
      </div>
    </div>
  </div>
}

// ─── CARDS VIEW ─────────────────────────────────────────────────────────────────
function CardsView({persons,photos,onSelect,filter}){
  function genLabel(g){return['Вы и ваша семья','Родители','Бабушки и дедушки','Прабабушки и прадедушки','Прапрадеды','Прапрапрадеды','Старшие поколения'][Math.min(g,6)]||`Поколение ${g+1}`}
  function getGen(id,vis=new Set()){
    if(vis.has(id))return 0;vis.add(id);
    const p=persons[id];if(!p||!p.famc)return 0;
    const f=FAMS[p.famc];if(!f)return 0;
    const par=f.husb||f.wife;if(!par)return 0;
    return 1+getGen(par,vis);
  }
  const directSet=useMemo(()=>{
    const s=new Set([MAIN]);
    function add(id,vis=new Set()){if(vis.has(id))return;vis.add(id);const p=persons[id];if(!p)return;if(p.famc){const f=FAMS[p.famc];if(f){if(f.husb){s.add(f.husb);add(f.husb,vis);}if(f.wife){s.add(f.wife);add(f.wife,vis);}}}if(id===MAIN){(p.fams||[]).forEach(fid=>{const f=FAMS[fid];if(!f)return;const sp=f.husb===id?f.wife:f.husb;if(sp)s.add(sp);(f.chil||[]).forEach(c=>s.add(c));});}}
    add(MAIN);return s;
  },[persons]);
  const ids=Object.keys(persons).filter(id=>filter==='direct'?directSet.has(id):true);
  const grouped={};
  ids.forEach(id=>{const g=getGen(id);if(!grouped[g])grouped[g]=[];grouped[g].push(id);});
  return <div className="cards-root">
    {Object.entries(grouped).sort((a,b)=>+a[0]-+b[0]).map(([g,list])=><div key={g}>
      <div className="gen-hdr">
        <div className="gen-hdr-line"/>
        <div className="gen-hdr-text">{genLabel(+g)}</div>
        <span className="gen-hdr-count">{list.length}</span>
        <div className="gen-hdr-line"/>
      </div>
      <div className="cards-grid">
        {list.filter(id=>persons[id]).map(id=>{
          const p=persons[id];
          const isMe=id===MAIN;
          const rel=RELATIONS[id];
          return <div key={id} className={`pcard ${isMe?'me':''} ${p.death?'dead':''}`} onClick={()=>onSelect(id)}>
            <div style={{display:'flex',justifyContent:'center',marginBottom:8}}>
              <Av p={p} sz={64} photos={photos}/>
            </div>
            <div className="card-name">{sn(p)}</div>
            {yr(p)&&<div className="card-dates">{yr(p)}</div>}
            {rel&&<div className="card-rel">{rel}</div>}
          </div>
        })}
      </div>
    </div>)}
  </div>
}

// ─── APP ────────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState(()=>localStorage.getItem('v')||'tree');
  const [filter,setFilter]=useState('all');
  const [sel,setSel]=useState(null);
  const [editId,setEditId]=useState(null);
  const [admin,setAdmin]=useState(false);
  const [showLogin,setShowLogin]=useState(false);
  const [photos,setPhotos]=useState({'I517':'assets/photo_I517_olga_solomina.jpg'});
  const [persons,setPersons]=useState({...INDS});
  const [q,setQ]=useState('');
  const [showRes,setShowRes]=useState(false);
  const dotRef=useRef(0);

  useEffect(()=>{
    try{
      const sp=localStorage.getItem('fp2');if(sp)setPersons({...INDS,...JSON.parse(sp)});
      const ph=localStorage.getItem('fp');if(ph)setPhotos(p=>({...p,...JSON.parse(ph)}));
    }catch(e){}
  },[]);

  function sv(v){setView(v);localStorage.setItem('v',v);}
  function dot(){dotRef.current++;if(dotRef.current>=3){dotRef.current=0;setShowLogin(true);}}

  const sRes=useMemo(()=>{
    if(!q.trim())return[];
    const ql=q.toLowerCase();
    return Object.keys(persons).filter(id=>{const p=persons[id];return fn(p).toLowerCase().includes(ql)||(p.maid||'').toLowerCase().includes(ql);}).slice(0,7);
  },[q,persons]);

  const total=Object.keys(persons).length;
  const oldest=Object.values(persons).reduce((m,p)=>{const y=by(p);return y&&y<m?y:m;},9999);

  return <>
    <div className="hdr">
      <div className="hdr-crest" onClick={dot}>
        <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="9" fill="none" stroke="#C9A84C" strokeWidth="1.2"/><text x="10" y="14" textAnchor="middle" fontSize="11" fontFamily="serif" fill="#C9A84C" fontWeight="bold">А</text></svg>
      </div>
      <div className="hdr-title">Семья Андросовых</div>
      <div className="hdr-nav">
        <button className={`nav-btn ${view==='tree'?'on':''}`} onClick={()=>sv('tree')}>Древо</button>
        <button className={`nav-btn ${view==='cards'?'on':''}`} onClick={()=>sv('cards')}>Карточки</button>
        {admin&&<button className="nav-btn" style={{borderColor:'#e8c96a',color:'#e8c96a'}} onClick={()=>setAdmin(false)}>Выход</button>}
      </div>
      <div className="hdr-search">
        <span className="s-ico">⌕</span>
        <input className="s-inp" placeholder="Поиск..." value={q} onChange={e=>{setQ(e.target.value);setShowRes(true)}} onFocus={()=>setShowRes(true)} onBlur={()=>setTimeout(()=>setShowRes(false),180)}/>
        {showRes&&sRes.length>0&&<div className="s-res">
          {sRes.map(id=>{const p=persons[id];return<div key={id} className="s-item" onClick={()=>{setSel(id);setQ('');setShowRes(false);}}>
            <Av p={p} sz={32} photos={photos}/>
            <div><div className="s-item-name">{sn(p)}</div><div className="s-item-sub">{RELATIONS[id]||yr(p)||''}</div></div>
          </div>})}
        </div>}
      </div>
    </div>

    <div className="toolbar">
      <span className="t-label">Показать:</span>
      <div className={`t-chip ${filter==='all'?'on':''}`} onClick={()=>setFilter('all')}>Все родственники</div>
      <div className={`t-chip ${filter==='direct'?'on':''}`} onClick={()=>setFilter('direct')}>Прямые предки</div>
      <div className="t-stats">
        <span><b>{total}</b> человек</span>
        <span>с <b>{oldest}</b> года</span>
        {admin&&<span className="admin-badge">Режим редактирования</span>}
      </div>
    </div>

    <div className="main">
      {view==='tree'&&<TreeView persons={persons} photos={photos} onSelect={setSel} filter={filter}/>}
      {view==='cards'&&<CardsView persons={persons} photos={photos} onSelect={setSel} filter={filter}/>}
    </div>

    {sel&&!editId&&<PersonModal id={sel} photos={photos} setPhotos={setPhotos} onClose={()=>setSel(null)} onNav={id=>setSel(id)} adminMode={admin} onEdit={setEditId} persons={persons}/>}
    {editId&&<EditModal id={editId} persons={persons} setPersons={setPersons} onClose={()=>setEditId(null)}/>}
    {showLogin&&<LoginModal onLogin={()=>setAdmin(true)} onClose={()=>setShowLogin(false)}/>}
    <button className="adot" onClick={dot}>·</button>
  </>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
